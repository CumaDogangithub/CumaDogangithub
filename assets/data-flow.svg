<svg xmlns="http://www.w3.org/2000/svg" width="820" height="200" viewBox="0 0 820 200" fill="none" role="img" aria-label="Live system data flow">
  <style>@media (prefers-reduced-motion: reduce){*{animation:none!important}}</style>
  <rect width="820" height="200" fill="#0B0E14"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="820" height="200" fill="url(#grid)"/>

  <!-- corner measure marks -->
  <g stroke="#38BDF8" stroke-width="1" opacity="0.5">
    <path d="M12 12 H40 M12 12 V40"/>
    <path d="M808 12 H780 M808 12 V40"/>
    <path d="M12 188 H40 M12 188 V160"/>
    <path d="M808 188 H780 M808 188 V160"/>
  </g>

  <!-- nodes -->
  <g font-family="monospace" font-size="13" fill="#E2E8F0" text-anchor="middle">
    <rect x="40"  y="80" width="120" height="40" rx="8" fill="#0B0E14" stroke="#38BDF8"/>
    <text x="100" y="105">GraphQL</text>
    <rect x="350" y="80" width="120" height="40" rx="8" fill="#0B0E14" stroke="#A78BFA"/>
    <text x="410" y="105">ML Engine</text>
    <rect x="660" y="80" width="120" height="40" rx="8" fill="#0B0E14" stroke="#FBBF24"/>
    <text x="720" y="105">Kafka</text>
  </g>

  <!-- wires -->
  <path d="M160 100 H350" stroke="url(#wire)" stroke-width="2"/>
  <path d="M470 100 H660" stroke="url(#wire)" stroke-width="2"/>

  <!-- flowing packets -->
  <circle r="4" fill="#38BDF8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M160 100 H350"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#A78BFA">
    <animateMotion dur="2.4s" begin="0.5s" repeatCount="indefinite" path="M470 100 H660"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- pulsing core -->
  <circle cx="410" cy="100" r="60" fill="none" stroke="#A78BFA" stroke-width="1">
    <animate attributeName="r" values="40;70" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
