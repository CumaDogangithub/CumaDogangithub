<svg xmlns="http://www.w3.org/2000/svg" width="860" height="200" viewBox="0 0 860 200" fill="none" role="img" aria-label="Tipik mimari: Next.js arayuz, API katmani, AI modeli, veritabani">
  <style>@media (prefers-reduced-motion: reduce){*{animation:none!important}}</style>
  <rect width="860" height="200" fill="#0B0E14"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="860" height="200" fill="url(#grid)"/>

  <!-- corner marks -->
  <g stroke="#38BDF8" stroke-width="1" opacity="0.5">
    <path d="M12 12 H40 M12 12 V40"/>
    <path d="M848 12 H820 M848 12 V40"/>
    <path d="M12 188 H40 M12 188 V160"/>
    <path d="M848 188 H820 M848 188 V160"/>
  </g>

  <text x="40" y="42" font-family="monospace" font-size="12" fill="#475569">// çoğu projemde tekrarlayan iskelet</text>

  <g font-family="monospace" font-size="13" fill="#E2E8F0" text-anchor="middle">
    <rect x="40"  y="82" width="130" height="42" rx="8" fill="#0B0E14" stroke="#38BDF8"/>
    <text x="105" y="108">Next.js</text>
    <rect x="280" y="82" width="150" height="42" rx="8" fill="#0B0E14" stroke="#38BDF8"/>
    <text x="355" y="103">FastAPI / Flask</text>
    <text x="355" y="116" font-size="9" fill="#94A3B8">async · Celery</text>
    <rect x="540" y="82" width="150" height="42" rx="8" fill="#0B0E14" stroke="#A78BFA"/>
    <text x="615" y="103">AI Modeli</text>
    <text x="615" y="116" font-size="9" fill="#94A3B8">yerel / bulut</text>
    <rect x="790" y="82" width="30" height="42" rx="8" fill="#0B0E14" stroke="#FBBF24"/>
    <text x="805" y="100" font-size="9">DB</text>
    <text x="805" y="113" font-size="8" fill="#94A3B8">pg</text>
  </g>

  <path d="M170 103 H280" stroke="url(#wire)" stroke-width="2"/>
  <path d="M430 103 H540" stroke="url(#wire)" stroke-width="2"/>
  <path d="M690 103 H790" stroke="url(#wire)" stroke-width="2"/>

  <circle r="4" fill="#38BDF8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M170 103 H280"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#A78BFA">
    <animateMotion dur="2.2s" begin="0.5s" repeatCount="indefinite" path="M430 103 H540"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#FBBF24">
    <animateMotion dur="2s" begin="1s" repeatCount="indefinite" path="M690 103 H790"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <circle cx="615" cy="103" r="62" fill="none" stroke="#A78BFA" stroke-width="1">
    <animate attributeName="r" values="42;72" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
