<svg xmlns="http://www.w3.org/2000/svg" width="440" height="170" viewBox="0 0 440 170" fill="none" role="img" aria-label="Tibbi goruntu analiz akisi">
  <style>@media (prefers-reduced-motion: reduce){*{animation:none!important}}</style>
  <rect width="440" height="170" fill="#0B0E14"/>
  <defs>
    <pattern id="g1" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="w1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="440" height="170" fill="url(#g1)"/>

  <text x="20" y="28" font-family="monospace" font-size="11" fill="#38BDF8">CT · MRI · X-ray  →  tani destegi</text>

  <g font-family="monospace" font-size="11" fill="#E2E8F0" text-anchor="middle">
    <rect x="18"  y="66" width="78" height="38" rx="7" fill="#0B0E14" stroke="#38BDF8"/>
    <text x="57" y="83">DICOM</text>
    <text x="57" y="96" font-size="9" fill="#94A3B8">preprocess</text>
    <rect x="150" y="66" width="86" height="38" rx="7" fill="#0B0E14" stroke="#A78BFA"/>
    <text x="193" y="82">EfficientNet</text>
    <text x="193" y="96" font-size="9" fill="#94A3B8">V2-M · Keras</text>
    <rect x="290" y="66" width="86" height="38" rx="7" fill="#0B0E14" stroke="#FBBF24"/>
    <text x="333" y="83">Sonuç</text>
    <text x="333" y="96" font-size="9" fill="#94A3B8">+ ısı haritası</text>
  </g>

  <path d="M96 85 H150" stroke="url(#w1)" stroke-width="2"/>
  <path d="M236 85 H290" stroke="url(#w1)" stroke-width="2"/>

  <circle r="3.5" fill="#38BDF8">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M96 85 H150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#A78BFA">
    <animateMotion dur="2s" begin="0.4s" repeatCount="indefinite" path="M236 85 H290"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="193" cy="85" r="46" fill="none" stroke="#A78BFA" stroke-width="1">
    <animate attributeName="r" values="30;52" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <text x="20" y="140" font-family="monospace" font-size="9" fill="#475569">Cloudflare → Nginx → Docker → Flask · rol bazlı erişim</text>
</svg>
