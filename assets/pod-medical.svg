<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160" fill="none" role="img" aria-label="Medical imaging AI flow">
  <style>@media (prefers-reduced-motion: reduce){*{animation:none!important}}</style>
  <rect width="400" height="160" fill="#0B0E14"/>
  <defs>
    <pattern id="g1" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="w1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="160" fill="url(#g1)"/>

  <g font-family="monospace" font-size="11" fill="#E2E8F0" text-anchor="middle">
    <rect x="20"  y="60" width="80" height="36" rx="7" fill="#0B0E14" stroke="#38BDF8"/>
    <text x="60" y="82">DICOM</text>
    <rect x="160" y="60" width="80" height="36" rx="7" fill="#0B0E14" stroke="#A78BFA"/>
    <text x="200" y="78">TF CNN</text>
    <text x="200" y="91" font-size="9" fill="#94A3B8">classifier</text>
    <rect x="300" y="60" width="80" height="36" rx="7" fill="#0B0E14" stroke="#FBBF24"/>
    <text x="340" y="82">Grad-CAM</text>
  </g>

  <path d="M100 78 H160" stroke="url(#w1)" stroke-width="2"/>
  <path d="M240 78 H300" stroke="url(#w1)" stroke-width="2"/>

  <circle r="3.5" fill="#38BDF8">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M100 78 H160"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#A78BFA">
    <animateMotion dur="2s" begin="0.4s" repeatCount="indefinite" path="M240 78 H300"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="78" r="46" fill="none" stroke="#A78BFA" stroke-width="1">
    <animate attributeName="r" values="30;52" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <text x="20" y="28" font-family="monospace" font-size="11" fill="#38BDF8">NeuroScan // brain-CT pipeline</text>
</svg>
