<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160" fill="none" role="img" aria-label="Algorithmic trading flow">
  <style>@media (prefers-reduced-motion: reduce){*{animation:none!important}}</style>
  <rect width="400" height="160" fill="#0B0E14"/>
  <defs>
    <pattern id="g2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#1E293B" stroke-width="1"/>
    </pattern>
    <linearGradient id="w2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="160" fill="url(#g2)"/>

  <g font-family="monospace" font-size="11" fill="#E2E8F0" text-anchor="middle">
    <rect x="14"  y="62" width="78" height="36" rx="7" fill="#0B0E14" stroke="#38BDF8"/>
    <text x="53" y="78">C++</text>
    <text x="53" y="91" font-size="9" fill="#94A3B8">ingestor</text>
    <rect x="160" y="62" width="80" height="36" rx="7" fill="#0B0E14" stroke="#A78BFA"/>
    <text x="200" y="78">Signals</text>
    <text x="200" y="91" font-size="9" fill="#94A3B8">python · ml</text>
    <rect x="308" y="62" width="78" height="36" rx="7" fill="#0B0E14" stroke="#FBBF24"/>
    <text x="347" y="78">MQL5</text>
    <text x="347" y="91" font-size="9" fill="#94A3B8">executor</text>
  </g>

  <path d="M92 80 H160" stroke="url(#w2)" stroke-width="2"/>
  <path d="M240 80 H308" stroke="url(#w2)" stroke-width="2"/>
  <!-- feedback loop -->
  <path d="M347 98 V130 H200 V98" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>

  <circle r="3.5" fill="#38BDF8">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M92 80 H160"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#FBBF24">
    <animateMotion dur="1.6s" begin="0.3s" repeatCount="indefinite" path="M240 80 H308"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <!-- feedback packet -->
  <circle r="3" fill="#34D399">
    <animateMotion dur="3s" repeatCount="indefinite" path="M347 98 V130 H200 V98"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <text x="14" y="28" font-family="monospace" font-size="11" fill="#FBBF24">QuantForge // risk-gated execution</text>
</svg>
